<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="38%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#2c2c3a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <linearGradient id="bloat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3550"/>
      <stop offset="100%" stop-color="#2a2740"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Context window frame: crowded with schema bloat (the "before") -->
  <rect x="80" y="80" width="470" height="340" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <g>
    <rect x="106" y="106" width="418" height="24" rx="5" fill="url(#bloat)"/>
    <rect x="106" y="138" width="386" height="24" rx="5" fill="url(#bloat)"/>
    <rect x="106" y="170" width="418" height="24" rx="5" fill="url(#bloat)"/>
    <rect x="106" y="202" width="356" height="24" rx="5" fill="url(#bloat)"/>
    <rect x="106" y="234" width="418" height="24" rx="5" fill="url(#bloat)"/>
    <rect x="106" y="266" width="398" height="24" rx="5" fill="url(#bloat)"/>
    <rect x="106" y="298" width="418" height="24" rx="5" fill="url(#bloat)"/>
    <!-- The thin slice of room left for the actual task -->
    <rect x="106" y="334" width="418" height="60" rx="5" fill="#ff6b4a" fill-opacity="0.16" stroke="#ff6b4a" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>

  <!-- Flow / compaction arrow region -->
  <g stroke="#ff6b4a" stroke-width="2.5" fill="none" stroke-opacity="0.9">
    <path d="M572 250 H648"/>
    <path d="M634 238 L650 250 L634 262"/>
  </g>
  <circle cx="610" cy="218" r="3" fill="#ff6b4a" fill-opacity="0.5"/>
  <circle cx="610" cy="282" r="3" fill="#ff6b4a" fill-opacity="0.5"/>

  <!-- Compacted window (the "after"): mostly free space, one lean tool -->
  <rect x="672" y="120" width="280" height="260" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <rect x="696" y="144" width="232" height="22" rx="5" fill="#ff6b4a" fill-opacity="0.85"/>
  <rect x="696" y="176" width="170" height="14" rx="4" fill="#ffffff" fill-opacity="0.12"/>

  <!-- Title -->
  <g font-family="Inter, -apple-system, sans-serif" fill="#ffffff">
    <text x="80" y="500" font-size="46" font-weight="700" letter-spacing="-0.5">MCP servers are eating</text>
    <text x="80" y="552" font-size="46" font-weight="700" letter-spacing="-0.5" opacity="0.55">the context window</text>
  </g>
</svg>
