<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="72%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1f2a4a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Position-area 3x3 grid around the anchor -->
  <g transform="translate(760 300)">
    <rect x="-140" y="-140" width="280" height="280" fill="none" stroke="#4f7cff" stroke-opacity="0.18" stroke-width="1.5" rx="6"/>
    <line x1="-46.7" y1="-140" x2="-46.7" y2="140" stroke="#4f7cff" stroke-opacity="0.14" stroke-width="1.5"/>
    <line x1="46.7" y1="-140" x2="46.7" y2="140" stroke="#4f7cff" stroke-opacity="0.14" stroke-width="1.5"/>
    <line x1="-140" y1="-46.7" x2="140" y2="-46.7" stroke="#4f7cff" stroke-opacity="0.14" stroke-width="1.5"/>
    <line x1="-140" y1="46.7" x2="140" y2="46.7" stroke="#4f7cff" stroke-opacity="0.14" stroke-width="1.5"/>

    <!-- Anchor element (center cell) -->
    <rect x="-46.7" y="-46.7" width="93.4" height="93.4" rx="8" fill="#242440" stroke="#4f7cff" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#4f7cff"/>

    <!-- Tether from anchor to floating panel (top) -->
    <path d="M0 -46.7 L0 -120" stroke="#5eead4" stroke-width="2" stroke-dasharray="4 5" fill="none"/>
    <!-- Floating panel positioned above the anchor -->
    <rect x="-72" y="-208" width="144" height="80" rx="10" fill="#1a1a2e" stroke="#5eead4" stroke-width="2.5"/>
    <rect x="-52" y="-188" width="104" height="9" rx="4.5" fill="#5eead4" fill-opacity="0.8"/>
    <rect x="-52" y="-170" width="72" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.18"/>
    <rect x="-52" y="-152" width="88" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.18"/>
  </g>

  <!-- Title -->
  <text x="80" y="250" font-family="Inter, -apple-system, sans-serif" font-size="66" font-weight="800" fill="#ffffff" letter-spacing="-1.5">CSS Anchor</text>
  <text x="80" y="322" font-family="Inter, -apple-system, sans-serif" font-size="66" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Positioning</text>

  <text x="82" y="392" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#5eead4" letter-spacing="0.5">Delete Floating UI. Ship pure CSS.</text>

  <!-- small labels as part of the concept -->
  <text x="616" y="196" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#5eead4" letter-spacing="1" text-anchor="middle">position-area</text>
</svg>
