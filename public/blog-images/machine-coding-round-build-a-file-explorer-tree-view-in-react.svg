<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="72%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#2f2f2f"/>
      <stop offset="100%" stop-color="#242424"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Tree-view metaphor: connector lines + nodes on the right -->
  <g transform="translate(770,150)">
    <!-- connectors -->
    <g stroke="#5c5c5c" stroke-width="2" fill="none">
      <path d="M20 20 V300"/>
      <path d="M20 90 H70"/>
      <path d="M90 110 V210"/>
      <path d="M90 130 H140"/>
      <path d="M90 200 H140"/>
      <path d="M20 300 H70"/>
    </g>

    <!-- root folder (open, accent) -->
    <g transform="translate(0,0)">
      <rect x="-14" y="6" width="34" height="26" rx="4" fill="#4db6ac"/>
      <rect x="-14" y="2" width="20" height="8" rx="2" fill="#4db6ac"/>
    </g>

    <!-- child folder -->
    <g transform="translate(70,76)">
      <rect x="0" y="4" width="30" height="22" rx="4" fill="#8a8a8a"/>
      <rect x="0" y="0" width="17" height="7" rx="2" fill="#8a8a8a"/>
    </g>

    <!-- leaf files under child -->
    <g transform="translate(140,116)">
      <rect x="0" y="0" width="22" height="28" rx="3" fill="none" stroke="#8a8a8a" stroke-width="2"/>
      <path d="M6 9 H16 M6 15 H16 M6 21 H12" stroke="#8a8a8a" stroke-width="2"/>
    </g>
    <g transform="translate(140,186)">
      <rect x="0" y="0" width="22" height="28" rx="3" fill="none" stroke="#4db6ac" stroke-width="2"/>
      <path d="M6 9 H16 M6 15 H16 M6 21 H12" stroke="#4db6ac" stroke-width="2"/>
    </g>

    <!-- bottom leaf -->
    <g transform="translate(70,286)">
      <rect x="0" y="0" width="22" height="28" rx="3" fill="none" stroke="#8a8a8a" stroke-width="2"/>
      <path d="M6 9 H16 M6 15 H16 M6 21 H12" stroke="#8a8a8a" stroke-width="2"/>
    </g>

    <!-- roving-focus ring on the accent file -->
    <rect x="132" y="178" width="140" height="44" rx="8" fill="none" stroke="#4db6ac" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>

  <!-- Title -->
  <text x="80" y="250" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#4db6ac" letter-spacing="2">MACHINE CODING ROUND</text>
  <text x="80" y="330" font-family="Inter, -apple-system, sans-serif" font-size="66" font-weight="800" fill="#f5f5f5">Build a File</text>
  <text x="80" y="404" font-family="Inter, -apple-system, sans-serif" font-size="66" font-weight="800" fill="#f5f5f5">Explorer</text>
  <text x="80" y="478" font-family="Inter, -apple-system, sans-serif" font-size="66" font-weight="800" fill="#7d7d7d">Tree View in React</text>
</svg>
