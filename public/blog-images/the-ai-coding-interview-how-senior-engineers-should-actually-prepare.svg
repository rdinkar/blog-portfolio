<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="72%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1e3a4f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ad1c4"/>
      <stop offset="100%" stop-color="#3a9ad9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#1a1a2e"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Concept: machine-generated code block on the right, being inspected /
       judged through a magnifier whose reticle becomes a checkmark of approval. -->
  <g transform="translate(720 150)">
    <!-- code panel -->
    <rect x="0" y="0" width="360" height="330" rx="14" fill="#13131f" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="26" cy="28" r="6" fill="#ffffff" fill-opacity="0.12"/>
    <circle cx="48" cy="28" r="6" fill="#ffffff" fill-opacity="0.12"/>
    <circle cx="70" cy="28" r="6" fill="#ffffff" fill-opacity="0.12"/>

    <!-- generated code lines, faint = unreviewed -->
    <g fill="#ffffff">
      <rect x="30" y="70"  width="200" height="10" rx="5" fill-opacity="0.22"/>
      <rect x="56" y="98"  width="150" height="10" rx="5" fill-opacity="0.16"/>
      <rect x="56" y="126" width="240" height="10" rx="5" fill-opacity="0.16"/>
      <rect x="30" y="154" width="120" height="10" rx="5" fill-opacity="0.22"/>
      <rect x="56" y="182" width="210" height="10" rx="5" fill-opacity="0.16"/>
      <!-- the suspect line, highlighted -->
      <rect x="56" y="210" width="170" height="10" rx="5" fill="#f0a04b" fill-opacity="0.85"/>
      <rect x="30" y="238" width="90"  height="10" rx="5" fill-opacity="0.22"/>
      <rect x="56" y="266" width="200" height="10" rx="5" fill-opacity="0.16"/>
      <rect x="30" y="294" width="60"  height="10" rx="5" fill-opacity="0.22"/>
    </g>

    <!-- magnifier inspecting the suspect line -->
    <g transform="translate(150 195)">
      <circle cx="0" cy="0" r="62" fill="#1a1a2e" fill-opacity="0.55" stroke="url(#accent)" stroke-width="5"/>
      <line x1="44" y1="44" x2="92" y2="92" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
      <!-- verification checkmark inside lens -->
      <path d="M-26 2 L-8 22 L28 -22" fill="none" stroke="#5ad1c4" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="200" font-family="Inter, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1.5">The AI coding</text>
  <text x="80" y="270" font-family="Inter, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1.5">interview</text>

  <text x="80" y="372" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="500" fill="#5ad1c4">They grade whether you can</text>
  <text x="80" y="412" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="500" fill="#5ad1c4">judge the code, not write it.</text>

  <rect x="80" y="450" width="64" height="5" rx="2.5" fill="url(#accent)"/>
</svg>
