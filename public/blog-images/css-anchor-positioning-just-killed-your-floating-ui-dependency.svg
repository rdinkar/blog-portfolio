<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="72%" cy="34%" r="55%">
      <stop offset="0%" stop-color="#1f2a3d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#2a2a45" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6c8cff"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Concept: an anchor element (solid) with a floating element tethered natively below it,
       plus a dashed flip-fallback position above. No JS loop, just declared geometry. -->

  <!-- anchor element -->
  <rect x="760" y="250" width="200" height="64" rx="10" fill="#6c8cff"/>
  <text x="860" y="290" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#101022" text-anchor="middle">anchor-name</text>

  <!-- tether line from anchor edge to floating element -->
  <line x1="860" y1="314" x2="860" y2="372" stroke="#6c8cff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- floating element (placed) -->
  <rect x="772" y="380" width="176" height="56" rx="10" fill="none" stroke="#6c8cff" stroke-width="2.5"/>
  <text x="860" y="414" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#aab8ff" text-anchor="middle">position-area</text>

  <!-- flip fallback (ghosted, above) -->
  <rect x="772" y="160" width="176" height="56" rx="10" fill="none" stroke="#3d4a6e" stroke-width="2" stroke-dasharray="5 6"/>
  <line x1="860" y1="246" x2="860" y2="222" stroke="#3d4a6e" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- title -->
  <text x="80" y="300" font-family="Inter, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#f4f4f8">CSS Anchor</text>
  <text x="80" y="368" font-family="Inter, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#f4f4f8">Positioning</text>

  <!-- subtle accent rule -->
  <rect x="82" y="400" width="120" height="5" rx="2.5" fill="#6c8cff"/>

  <!-- key phrase -->
  <text x="80" y="452" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#8a8aa8">Zero-JS floating UI, native</text>
</svg>
