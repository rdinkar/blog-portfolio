<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#1f2a3a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#61dafb" stop-opacity="0"/>
      <stop offset="100%" stop-color="#61dafb" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left: manual memo hooks, fading -->
  <g font-family="Inter, -apple-system, sans-serif" text-anchor="middle">
    <g opacity="0.32">
      <rect x="120" y="205" width="180" height="46" rx="8" fill="none" stroke="#8a94a6" stroke-width="1.5" stroke-dasharray="5 5"/>
      <text x="210" y="234" fill="#8a94a6" font-size="20" font-weight="500">useMemo</text>
    </g>
    <g opacity="0.28">
      <rect x="120" y="285" width="180" height="46" rx="8" fill="none" stroke="#8a94a6" stroke-width="1.5" stroke-dasharray="5 5"/>
      <text x="210" y="314" fill="#8a94a6" font-size="20" font-weight="500">useCallback</text>
    </g>
    <g opacity="0.2">
      <rect x="120" y="365" width="180" height="46" rx="8" fill="none" stroke="#8a94a6" stroke-width="1.5" stroke-dasharray="5 5"/>
      <text x="210" y="394" fill="#8a94a6" font-size="20" font-weight="500">memo()</text>
    </g>
  </g>

  <!-- Flow beams into the compiler -->
  <g stroke-width="2" fill="none">
    <path d="M300 228 C 400 228, 460 290, 540 310" stroke="url(#beam)"/>
    <path d="M300 308 C 400 308, 470 310, 540 310" stroke="url(#beam)"/>
    <path d="M300 388 C 400 388, 460 330, 540 310" stroke="url(#beam)"/>
  </g>

  <!-- Center: the compiler core -->
  <g>
    <circle cx="600" cy="310" r="66" fill="none" stroke="#61dafb" stroke-opacity="0.25" stroke-width="1.5"/>
    <circle cx="600" cy="310" r="48" fill="#1a1a2e" stroke="#61dafb" stroke-width="2.5"/>
    <ellipse cx="600" cy="310" rx="48" ry="17" fill="none" stroke="#61dafb" stroke-width="2"/>
    <ellipse cx="600" cy="310" rx="48" ry="17" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(60 600 310)"/>
    <ellipse cx="600" cy="310" rx="48" ry="17" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(120 600 310)"/>
    <circle cx="600" cy="310" r="6" fill="#61dafb"/>
  </g>

  <!-- Output: auto-memoized -->
  <g stroke-width="2" fill="none">
    <path d="M660 310 C 740 310, 800 310, 870 310" stroke="url(#beam)"/>
  </g>
  <g font-family="Inter, -apple-system, sans-serif" text-anchor="middle">
    <rect x="880" y="285" width="200" height="50" rx="10" fill="none" stroke="#61dafb" stroke-width="2"/>
    <text x="980" y="316" fill="#e8f6fd" font-size="20" font-weight="600">auto-memoized</text>
  </g>

  <!-- Title -->
  <g font-family="Inter, -apple-system, sans-serif" fill="#faf9f6">
    <text x="80" y="110" font-size="52" font-weight="700" letter-spacing="-1">React Compiler 1.0</text>
    <text x="80" y="540" font-size="30" font-weight="500" fill="#c9d3e0">Do you still need</text>
    <text x="80" y="582" font-size="30" font-weight="500" fill="#c9d3e0">useMemo and useCallback?</text>
  </g>
</svg>
